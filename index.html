<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>商品登録</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="card">
    <h1>しょうひん とうろく</h1>

    <label for="jan">JANコード</label>
    <input id="jan" type="text" inputmode="numeric" placeholder="13けた">

    <button id="scanBtn" type="button">JANをカメラで読む</button>

    <label for="name">しょうひんめい</label>
    <input id="name" type="text" placeholder="テストグミ">

    <label for="price">たんか</label>
    <input id="price" type="number" inputmode="numeric" placeholder="598">

    <label for="image">がぞう</label>
    <!-- ✅ capture を外すと「カメラ / 写真」を選べるようになります -->
    <input id="image" type="file" accept="image/*">

    <div class="preview">
      <img id="preview" style="display:none;">
    </div>

    <button id="submitBtn" type="button">登録する</button>

    <div id="msg" class="message"></div>
  </div>

  <!-- ✅ スキャン用モーダル -->
  <div id="scannerModal" class="modal hidden" aria-hidden="true">
    <div class="modalContent">
      <div class="modalHeader">
        <div class="modalTitle">カメラでJANを読み取り</div>
        <button id="closeScannerBtn" class="smallBtn" type="button">とじる</button>
      </div>
      <video id="video" autoplay playsinline></video>
      <div class="hint">バーコードをカメラに写してください（自動入力）</div>
    </div>
  </div>

  <!-- ZXing (バーコード読み取り) -->
  <script src="https://unpkg.com/@zxing/library@latest"></script>
  <script src="app.js"></script>
</body>
</html>
